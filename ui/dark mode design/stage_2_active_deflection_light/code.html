<body class="bg-primary-container text-on-surface font-body-md min-h-screen flex flex-col items-center">
<main class="w-full max-w-md px-margin-mobile py-8 flex flex-col flex-1 relative">
<!-- Header Section -->
<header class="text-center mt-6 mb-12">
<h1 class="font-display text-display text-on-secondary-fixed-variant tracking-tight">Breathe</h1>
<p class="font-label-lg text-label-lg text-secondary mt-2 opacity-80 uppercase tracking-widest">4-7-8 Rhythm</p>
</header>
<!-- Breathing Animation Area -->
<div class="relative w-[280px] h-[280px] mx-auto mb-16 flex items-center justify-center">
<!-- Outer Ring -->
<div class="absolute inset-0 rounded-full border border-secondary/10 scale-105"></div>
<!-- Middle Ring -->
<div class="absolute inset-6 rounded-full border border-secondary/20"></div>
<!-- Inner Circle -->
<div class="absolute inset-12 rounded-full bg-secondary-container/40 flex items-center justify-center border border-secondary/10">
<span class="font-headline-md text-headline-md text-secondary">Inhale</span>
</div>
<!-- Progress Marker -->
<div class="absolute top-0 w-3 h-3 rounded-full bg-tertiary-fixed-dim border-2 border-primary-container -mt-1.5"></div>
</div>
<!-- Grounding Remembrance Section -->
<section class="flex-1 flex flex-col">
<div class="flex items-center justify-center mb-6">
<div class="h-px bg-gradient-to-r from-transparent via-secondary/20 to-transparent flex-1"></div>
<h2 class="font-headline-md text-headline-md text-on-surface-variant px-4 text-center">Grounding Remembrance</h2>
<div class="h-px bg-gradient-to-r from-transparent via-secondary/20 to-transparent flex-1"></div>
</div>
<div class="flex flex-col space-y-4 w-full px-2">
<!-- Card 1 -->
<button class="w-full flex items-center justify-between bg-surface border border-secondary/15 rounded-lg p-5 hover:bg-surface-container-low transition-colors group">
<span class="font-headline-md text-headline-md text-on-secondary-fixed-variant">SubhanAllah</span>
<span class="font-label-sm text-label-sm bg-primary-container border border-secondary/10 text-secondary px-3 py-1.5 rounded-full group-active:bg-secondary-container group-active:text-on-secondary-container transition-colors">0 / 33</span>
</button>
<!-- Card 2 -->
<button class="w-full flex items-center justify-between bg-surface border border-secondary/15 rounded-lg p-5 hover:bg-surface-container-low transition-colors group">
<span class="font-headline-md text-headline-md text-on-secondary-fixed-variant">Alhamdulillah</span>
<span class="font-label-sm text-label-sm bg-primary-container border border-secondary/10 text-secondary px-3 py-1.5 rounded-full group-active:bg-secondary-container group-active:text-on-secondary-container transition-colors">0 / 33</span>
</button>
<!-- Card 3 -->
<button class="w-full flex items-center justify-between bg-surface border border-secondary/15 rounded-lg p-5 hover:bg-surface-container-low transition-colors group">

<span class="font-label-sm text-label-sm bg-primary-container border border-secondary/10 text-secondary px-3 py-1.5 rounded-full group-active:bg-secondary-container group-active:text-on-secondary-container transition-colors">0 / 33</span>

</section>

<div class="flex flex-col items-center justify-center mb-6">
