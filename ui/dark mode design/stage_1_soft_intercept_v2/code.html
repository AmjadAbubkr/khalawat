<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface antialiased min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop selection:bg-secondary-container selection:text-secondary-fixed">
<!-- 
      Navigation is suppressed as this is an Interstitial/Task-Focused intervention screen.
      The goal is to focus the user entirely on the reflection canvas without "escape hatches" 
      other than the intentional actions provided.
    -->
<main class="w-full max-w-2xl relative flex flex-col items-center justify-center border border-secondary/15 rounded-xl bg-surface-bright py-20 md:py-28 px-6 md:px-12 text-center" style="min-height: 70vh;">
<!-- The "Gold Thread" Accent -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-tertiary-fixed-dim rounded-t-xl opacity-80"></div>
<!-- Status Message -->
<p class="font-headline-md text-headline-md text-secondary/70 mb-12">
            Take a moment to reflect...
        </p>
<!-- Quranic Ayah Container -->
<div class="mb-16 max-w-lg mx-auto">
<h1 class="font-display text-display text-secondary leading-relaxed mb-6" dir="rtl" style="line-height: 1.5;">
                أَلَا بِذِكْرِ ٱللَّهِ تَطْمَئِنُّ ٱلْقُلُوبُ
            </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant italic">
                "Verily, in the remembrance of Allah do hearts find rest."
            </p>
<p class="font-label-sm text-label-sm text-secondary/50 mt-3 uppercase tracking-widest">
                Quran 13:28
            </p>
</div>
<!-- Circular Countdown Timer -->
<div class="relative w-36 h-36 mb-16 flex flex-col items-center justify-center group">
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<!-- Background track -->
<circle class="text-secondary/10" cx="50" cy="50" fill="none" r="47" stroke="currentColor" stroke-width="1.5"></circle>
<!-- Progress ring (Static representation of a running timer) -->
<circle class="text-secondary" cx="50" cy="50" fill="none" r="47" stroke="currentColor" stroke-dasharray="295" stroke-dashoffset="110" stroke-linecap="round" stroke-width="2"></circle>
</svg>
<div class="flex flex-col items-center mt-1">
<span class="font-display text-display text-secondary leading-none">15</span>
<span class="font-label-sm text-label-sm text-secondary/60 uppercase tracking-widest mt-1">Sec</span>
</div>
</div>
<!-- Primary Action -->
<button class="bg-tertiary-fixed-dim text-secondary font-label-lg text-label-lg px-10 py-4 rounded-lg hover:opacity-90 hover:bg-tertiary-fixed transition-all duration-300 flex items-center gap-3">
<span class="material-symbols-outlined" style="font-size: 20px;">spa</span>
            Go Back to Peace
        </button>
<!-- Subtle Bypass Option -->
<button class="mt-10 font-label-sm text-label-sm text-secondary/40 hover:text-secondary/70 transition-colors border-b border-transparent hover:border-secondary/30 pb-0.5">
            Continue anyway
        </button>
</main>
</body></html>
