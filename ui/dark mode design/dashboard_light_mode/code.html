<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Khalawat - Control Center</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed": "#ffe088",
                    "on-secondary": "#ffffff",
                    "primary-container": "#f5f5f0",
                    "on-secondary-fixed-variant": "#364c36",
                    "secondary": "#4d644d",
                    "surface-container-high": "#ebe7e6",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#e9c349",
                    "on-primary-fixed": "#1a1c19",
                    "secondary-container": "#cfeacc",
                    "outline-variant": "#c5c7c1",
                    "on-error-container": "#93000a",
                    "on-surface-variant": "#454843",
                    "surface-container-highest": "#e5e2e1",
                    "on-tertiary-fixed-variant": "#574500",
                    "inverse-surface": "#313030",
                    "secondary-fixed-dim": "#b4cdb1",
                    "on-tertiary": "#ffffff",
                    "surface-tint": "#5d5f5b",
                    "surface-variant": "#e5e2e1",
                    "on-surface": "#1c1b1b",
                    "on-tertiary-container": "#886c00",
                    "on-primary-container": "#6f706c",
                    "primary": "#5d5f5b",
                    "background": "#fcf8f7",
                    "secondary-fixed": "#cfeacc",
                    "inverse-on-surface": "#f4f0ef",
                    "on-tertiary-fixed": "#241a00",
                    "outline": "#757873",
                    "tertiary-container": "#fff4de",
                    "surface-container-lowest": "#ffffff",
                    "on-background": "#1c1b1b",
                    "tertiary": "#735c00",
                    "surface-bright": "#fcf8f7",
                    "primary-fixed-dim": "#c6c7c2",
                    "surface-container-low": "#f7f3f2",
                    "surface-container": "#f1edec",
                    "inverse-primary": "#c6c7c2",
                    "error": "#ba1a1a",
                    "surface": "#fcf8f7",
                    "on-primary-fixed-variant": "#454744",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#0b200e",
                    "on-secondary-container": "#536a53",
                    "primary-fixed": "#e3e3de",
                    "surface-dim": "#ddd9d8",
                    "on-error": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-mobile": "20px",
                    "margin-desktop": "64px",
                    "gutter": "24px",
                    "unit": "8px",
                    "container-max": "1120px"
            },
            "fontFamily": {
                    "headline-md": ["Newsreader"],
                    "body-lg": ["Newsreader"],
                    "label-sm": ["Newsreader"],
                    "display": ["Newsreader"],
                    "label-lg": ["Newsreader"],
                    "headline-lg-mobile": ["Newsreader"],
                    "headline-lg": ["Newsreader"],
                    "body-md": ["Newsreader"]
            },
            "fontSize": {
                    "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "500"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.03em", "fontWeight": "500"}],
                    "display": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "headline-lg-mobile": ["28px", {"lineHeight": "36px", "fontWeight": "500"}],
                    "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "500"}],
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
            }
          }
        }
      }
    </script>
<style>
        body { font-family: 'Newsreader', serif; }
        /* Ensuring standard styles don't override Tailwind base */
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container text-on-surface min-h-screen flex flex-col selection:bg-tertiary-container selection:text-on-tertiary-container">
<!-- TopAppBar -->
<header class="w-full top-0 bg-background border-b border-secondary/10 sticky z-40">
<div class="flex items-center justify-between px-margin-mobile md:px-margin-desktop py-4 w-full max-w-container-max mx-auto">
<!-- Mobile Leading Icon -->
<button class="md:hidden hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-secondary">menu</span>
</button>
<!-- Brand -->
<h1 class="font-display text-headline-lg text-secondary tracking-tight">Khalawat</h1>
<!-- Desktop Navigation -->
<nav class="hidden md:flex items-center space-x-12">
<a class="font-label-lg text-label-lg text-secondary border-b-[2px] border-tertiary-fixed-dim pb-1 flex items-center space-x-2" href="#">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">spa</span>
<span>Peace</span>
</a>
<a class="font-label-lg text-label-lg text-on-surface-variant hover:opacity-80 transition-opacity flex items-center space-x-2" href="#">
<span class="material-symbols-outlined text-[18px]">menu_book</span>
<span>Library</span>
</a>
<a class="font-label-lg text-label-lg text-on-surface-variant hover:opacity-80 transition-opacity flex items-center space-x-2" href="#">
<span class="material-symbols-outlined text-[18px]">person</span>
<span>Self</span>
</a>
</nav>
<!-- Trailing Icon -->
<button class="hover:opacity-80 transition-opacity active:scale-95 duration-200">
<span class="material-symbols-outlined text-secondary">settings</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-12 md:py-24 pb-32 max-w-container-max mx-auto w-full space-y-16">
<!-- Sanctuary Status Indicator -->
<section class="flex flex-col items-center space-y-10 relative mt-8 md:mt-0">
<!-- Meditative Rings -->
<div class="w-72 h-72 rounded-full border border-secondary/20 flex items-center justify-center relative bg-surface-container-lowest/50 backdrop-blur-sm shadow-[0_0_40px_rgba(77,100,77,0.05)]">
<div class="absolute w-60 h-60 rounded-full border border-secondary/10"></div>
<div class="absolute w-48 h-48 rounded-full border border-secondary/5 bg-surface-container-lowest flex items-center justify-center">
<span class="material-symbols-outlined text-7xl text-secondary" style="font-variation-settings: 'FILL' 1;">shield</span>
</div>
</div>
<div class="text-center space-y-2">
<h2 class="font-display text-display text-on-surface tracking-tight">Protected</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Your environment is currently shielded from external noise.</p>
</div>
</section>
<!-- Metrics Bento Grid -->
<section class="grid grid-cols-2 gap-gutter w-full max-w-lg">
<!-- Intervention Metric -->
<div class="bg-surface-container-lowest rounded-xl border border-secondary/10 border-t-[2px] border-t-tertiary-fixed-dim p-8 flex flex-col items-center justify-center text-center hover:bg-surface-container-low transition-colors duration-300">
<h3 class="font-label-sm text-label-sm text-on-surface-variant tracking-[0.1em] uppercase mb-3">Interventions</h3>
<span class="font-display text-headline-lg text-secondary">3</span>
</div>
<!-- Current Level Metric -->
<div class="bg-surface-container-lowest rounded-xl border border-secondary/10 border-t-[2px] border-t-tertiary-fixed-dim p-8 flex flex-col items-center justify-center text-center hover:bg-surface-container-low transition-colors duration-300">
<h3 class="font-label-sm text-label-sm text-on-surface-variant tracking-[0.1em] uppercase mb-3">Current Level</h3>
<span class="font-headline-md text-headline-md text-secondary">Cooling</span>
</div>
</section>
<!-- Primary Action -->
<section class="w-full max-w-lg mt-8">
<button class="w-full bg-tertiary-fixed text-on-tertiary-fixed-variant font-label-lg text-label-lg py-5 rounded-lg flex items-center justify-center space-x-2 hover:opacity-90 transition-all active:scale-95 duration-200 shadow-sm shadow-tertiary/10">
<span class="material-symbols-outlined text-[20px]">power_settings_new</span>
<span>Disable Khalawat</span>
</button>
</section>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-safe bg-surface border-t border-secondary/10 md:hidden">
<!-- Active: Peace -->
<button class="flex flex-col items-center justify-center bg-tertiary-container text-on-tertiary-container rounded-xl px-6 py-2 hover:bg-surface-container-low active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">spa</span>
<span class="font-label-lg text-label-lg mt-1 hidden sm:block text-[10px]">Peace</span>
</button>
<!-- Inactive: Library -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 hover:bg-surface-container-low active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">menu_book</span>
<span class="font-label-lg text-label-lg mt-1 hidden sm:block text-[10px]">Library</span>
</button>
<!-- Inactive: Self -->
<button class="flex flex-col items-center justify-center text-on-surface-variant px-6 py-2 hover:bg-surface-container-low active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined">person</span>
<span class="font-label-lg text-label-lg mt-1 hidden sm:block text-[10px]">Self</span>
</button>
</nav>
</body></html>
