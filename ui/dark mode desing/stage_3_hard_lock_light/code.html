<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Focus Lock</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

<script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "tertiary-fixed": "#ffe088",

                        "surface-container-high": "#ebe7e6",

                        "tertiary-fixed-dim": "#e9c349",
                        "on-primary-fixed": "#1a1c19",
                        "secondary-container": "#cfeacc",
                        "outline-variant": "#c5c7c1",
                        "on-error-container": "#93000a",
                        "on-surface-variant": "#454843",
                        "surface-container-highest": "#e5e2e1",
                        "on-tertiary-fixed-variant": "#574500",
                        "inverse-surface": "#313030",
                        "secondary-fixed-dim": "#b4cdb1",
                        "on-tertiary": "#ffffff",
                        "surface-tint": "#5d5f5b",
                        "surface-variant": "#e5e2e1",
                        "on-surface": "#1c1b1b",
                        "on-tertiary-container": "#886c00",
                        "on-primary-container": "#6f706c",
                        "primary": "#5d5f5b",
                        "background": "#fcf8f7",
                        "secondary-fixed": "#cfeacc",
                        "inverse-on-surface": "#f4f0ef",
                        "on-tertiary-fixed": "#241a00",
                        "outline": "#757873",
                        "tertiary-container": "#fff4de",
                        "surface-container-lowest": "#ffffff",
                        "on-background": "#1c1b1b",
                        "tertiary": "#735c00",
                        "surface-bright": "#fcf8f7",
                        "primary-fixed-dim": "#c6c7c2",
                        "surface-container-low": "#f7f3f2",
                        "surface-container": "#f1edec",
                        "inverse-primary": "#c6c7c2",
                        "error": "#ba1a1a",
                        "surface": "#fcf8f7",
                        "on-primary-fixed-variant": "#454744",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#0b200e",
                        "on-secondary-container": "#536a53",
                        "primary-fixed": "#e3e3de",
                        "surface-dim": "#ddd9d8",
                        "on-error": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-mobile": "20px",
                        "margin-desktop": "64px",
                        "gutter": "24px",
                        "unit": "8px",
                        "container-max": "1120px"
                    },
                    fontFamily: {
                        "headline-md": ["Newsreader"],
                        "body-lg": ["Newsreader"],
                        "label-sm": ["Newsreader"],
                        "display": ["Newsreader"],
                        "label-lg": ["Newsreader"],
                        "headline-lg-mobile": ["Newsreader"],
                        "headline-lg": ["Newsreader"],
                        "body-md": ["Newsreader"]
                    },
                    fontSize: {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "500" }],

            }
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom size utility honoring the prompt's request for "large" without arbitrary hex colors */
        .text-hero-icon { font-size: 80px; line-height: 1; }
        .text-hero-timer { font-size: 72px; line-height: 1; letter-spacing: 0.05em; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container text-on-surface min-h-screen flex flex-col items-center justify-between px-margin-mobile md:px-margin-desktop py-12 md:py-16 selection:bg-tertiary-container selection:text-on-tertiary-container">
<!-- 
      Semantic Shell Suppression: 
      TopAppBar and BottomNavBar are intentionally suppressed here.
      This is a "Hard Lock" transactional screen. The user is in a focused, 
      inescapable journey until the timer completes.
    -->
<main class="flex-1 w-full max-w-3xl mx-auto flex flex-col items-center justify-center text-center mt-8">
<!-- Hero Icon -->
<div class="mb-10 flex items-center justify-center w-32 h-32 rounded-full bg-surface-container-lowest border border-secondary/10 shadow-sm relative">
<div class="absolute inset-0 rounded-full border border-tertiary-fixed-dim/30 scale-110 animate-pulse"></div>
<span class="material-symbols-outlined text-tertiary-fixed-dim text-hero-icon">lock</span>
</div>
<!-- Messaging -->
<div class="max-w-xl mx-auto mb-16 space-y-6">
<h1 class="font-display text-headline-lg-mobile md:text-display text-on-secondary-fixed-variant" dir="rtl">
                أَنْتَ وَضَعْتَ هَذَا الْقَفْلَ لِنَفْسِكَ
            </h1>
<p class="font-body-lg text-body-lg text-on-primary-container">
                You placed this lock on yourself
            </p>
</div>
<!-- Timer -->
<div class="relative mb-20 group">
<div class="absolute -inset-8 rounded-full bg-surface-container-low border border-secondary/5 blur-md -z-10"></div>
<div class="font-display text-hero-timer text-on-secondary-fixed-variant font-bold tracking-widest tabular-nums">
                02:00
            </div>
<div class="mt-4 flex justify-center w-full">
<div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-tertiary-fixed-dim to-transparent opacity-50"></div>
</div>
</div>
<!-- Suggestions Bento -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-unit w-full max-w-2xl mx-auto">
<div class="border-t border-secondary/10 bg-surface-container-lowest rounded-b-lg rounded-t-sm p-6 flex flex-col items-center justify-center gap-4 hover:bg-surface-container-low transition-colors duration-300 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-full h-[2px] bg-tertiary-fixed-dim/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-on-secondary-fixed-variant text-[32px]">water_drop</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Make Wudu</span>
</div>
<div class="border-t border-secondary/10 bg-surface-container-lowest rounded-b-lg rounded-t-sm p-6 flex flex-col items-center justify-center gap-4 hover:bg-surface-container-low transition-colors duration-300 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-full h-[2px] bg-tertiary-fixed-dim/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-on-secondary-fixed-variant text-[32px]">directions_run</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Leave the Room</span>
</div>
<div class="border-t border-secondary/10 bg-surface-container-lowest rounded-b-lg rounded-t-sm p-6 flex flex-col items-center justify-center gap-4 hover:bg-surface-container-low transition-colors duration-300 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-full h-[2px] bg-tertiary-fixed-dim/20 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-on-secondary-fixed-variant text-[32px]">mosque</span>
<span class="font-label-lg text-label-lg text-on-surface-variant">Pray 2 Rak'ah</span>
</div>
</div>
</main>
<!-- Bottom Action -->
<div class="w-full max-w-sm mx-auto mt-12">
<button class="w-full py-4 rounded-lg font-label-lg text-label-lg bg-surface-variant text-outline cursor-not-allowed border border-outline-variant flex justify-center items-center opacity-70 transition-all" disabled="">
<span class="material-symbols-outlined mr-3 text-[20px] opacity-50">lock_clock</span>
            Lock Complete
        </button>
</div>
</body></html>
