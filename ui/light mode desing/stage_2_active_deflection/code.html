<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Deflection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&amp;family=Newsreader:wght@500;600&amp;family=Noto+Serif:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#735c00",
                        "primary": "#f2ca50",
                        "on-surface": "#e5e2e1",
                        "background": "#131313",
                        "on-surface-variant": "#d0c5af",
                        "surface-variant": "#353534",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#0b2013",
                        "inverse-on-surface": "#313030",
                        "surface-container-low": "#1c1b1b",
                        "secondary": "#b4cdb8",
                        "on-error": "#690005",
                        "surface-container-highest": "#353534",
                        "outline": "#99907c",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "on-primary": "#3c2f00",
                        "secondary-fixed": "#d0e9d4",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed": "#ffe088",
                        "on-primary-fixed-variant": "#574500",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-container": "#3d455a",
                        "on-primary-fixed": "#241a00",
                        "tertiary-fixed-dim": "#bec6e0",
                        "primary-container": "#d4af37",
                        "surface": "#131313",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#e9c349",
                        "on-tertiary-fixed": "#131b2e",
                        "on-secondary-fixed-variant": "#364c3c",
                        "tertiary": "#c6cee8",
                        "tertiary-fixed": "#dae2fd",
                        "on-tertiary": "#283044",
                        "surface-bright": "#393939",
                        "secondary-container": "#364c3c",
                        "tertiary-container": "#abb2cc",
                        "surface-tint": "#e9c349",
                        "on-background": "#e5e2e1",
                        "surface-container": "#201f1f",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary": "#203527",
                        "on-secondary-container": "#a3bba7",
                        "on-primary-container": "#554300",
                        "secondary-fixed-dim": "#b4cdb8",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131313",
                        "outline-variant": "#4d4635",
                        "deflection-bg": "#071a09"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "32px",
                        "container-padding-mobile": "20px",
                        "container-padding-desktop": "40px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "quote-arabic": ["Noto Serif"],
                        "headline-sm": ["Newsreader"],
                        "headline-md": ["Newsreader"],
                        "display-lg": ["Newsreader"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "quote-arabic": ["24px", { "lineHeight": "40px", "fontWeight": "400" }],
                        "headline-sm": ["22px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "500" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .glow-gold {
            box-shadow: inset 0 0 4px 1px rgba(242, 202, 80, 0.3);
        }
        .outer-glow-gold {
            box-shadow: 0 0 15px 2px rgba(242, 202, 80, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-deflection-bg text-on-surface font-body-md antialiased min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Scrim / Radial Gradient -->
<div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);"></div>
<div class="w-full max-w-[680px] px-container-padding-mobile flex flex-col items-center relative z-10 gap-12">
<!-- Breathing Circle -->
<div class="flex flex-col items-center gap-6">
<h2 class="font-headline-md text-headline-md text-secondary tracking-wide text-center">Breathe</h2>
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Outer Halo -->
<div class="absolute inset-0 rounded-full border-[0.5px] border-primary/20 scale-110"></div>
<!-- Main Breathing Circle -->
<div class="w-32 h-32 rounded-full bg-surface-container-high border-[0.5px] border-primary/30 flex items-center justify-center shadow-[0_0_30px_rgba(242,202,80,0.1)] glow-gold transition-transform duration-[4000ms] ease-in-out scale-125">
<span class="font-label-md text-label-md text-primary opacity-80">Inhale</span>
</div>
</div>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-xs">Focus on your breath. Inhale 4s, hold 7s, exhale 8s.</p>
</div>
<!-- Dhikr Counter -->
<div class="w-full flex flex-col gap-4 mt-8">
<h3 class="font-headline-sm text-headline-sm text-center text-primary-fixed-dim border-b border-outline-variant/30 pb-2 w-full max-w-xs mx-auto">Remembrance</h3>
<div class="flex flex-col gap-3">
<!-- Item 1 -->
<div class="bg-surface-container-low/80 backdrop-blur-md rounded-xl p-6 flex flex-col items-center border-[0.5px] border-outline-variant/50 hover:border-primary/40 transition-colors cursor-pointer group">
<span class="font-quote-arabic text-quote-arabic text-on-surface mb-2">سُبْحَانَ اللَّهِ</span>
<span class="font-body-md text-body-md text-on-surface-variant text-center mb-4">Glory be to Allah</span>
<div class="w-12 h-12 rounded-full border border-primary/30 flex items-center justify-center group-hover:bg-primary/10 transition-colors">
<span class="font-label-md text-label-md text-primary">0</span>
</div>
</div>
<!-- Item 2 -->
<div class="bg-surface-container-low/80 backdrop-blur-md rounded-xl p-6 flex flex-col items-center border-[0.5px] border-outline-variant/50 hover:border-primary/40 transition-colors cursor-pointer group">
<span class="font-quote-arabic text-quote-arabic text-on-surface mb-2">الْحَمْدُ لِلَّهِ</span>
<span class="font-body-md text-body-md text-on-surface-variant text-center mb-4">Praise be to Allah</span>
<div class="w-12 h-12 rounded-full border border-primary/30 flex items-center justify-center group-hover:bg-primary/10 transition-colors">
<span class="font-label-md text-label-md text-primary">0</span>
</div>
</div>
<!-- Item 3 -->
<div class="bg-surface-container-low/80 backdrop-blur-md rounded-xl p-6 flex flex-col items-center border-[0.5px] border-outline-variant/50 hover:border-primary/40 transition-colors cursor-pointer group">
<span class="font-quote-arabic text-quote-arabic text-on-surface mb-2">اللَّهُ أَكْبَرُ</span>
<span class="font-body-md text-body-md text-on-surface-variant text-center mb-4">Allah is Greatest</span>
<div class="w-12 h-12 rounded-full border border-primary/30 flex items-center justify-center group-hover:bg-primary/10 transition-colors">
<span class="font-label-md text-label-md text-primary">0</span>
</div>
</div>
</div>
</div>
<!-- Timer & Actions -->
<div class="w-full flex flex-col items-center gap-8 mt-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 0;">timer</span>
<span class="font-headline-md text-headline-md text-primary tracking-widest">00:30</span>
</div>
<div class="flex flex-col w-full max-w-xs gap-4">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-4 rounded-full outer-glow-gold hover:bg-primary-fixed transition-all">
                    I've calmed down — go back
                </button>
<button class="w-full bg-transparent text-on-surface-variant font-label-md text-label-md py-3 rounded-full border border-outline-variant hover:text-primary hover:border-primary/50 transition-colors">
                    Override
                </button>
</div>
</div>
</div>
</body></html>
