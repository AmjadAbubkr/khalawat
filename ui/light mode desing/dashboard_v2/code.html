<!DOCTYPE html>

<html class="dark" lang="en"><head>

<title>Dashboard - Khalawat</title>

<style>
        /* Tonal Luminosity & Layered Opacity */
        .glass-panel {
            background: rgba(32, 31, 31, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(153, 144, 124, 0.1);
        }
        
        .gold-glow {
            box-shadow: inset 0 0 0 0.5px rgba(242, 202, 80, 0.4), 0 4px 24px -4px rgba(0, 0, 0, 0.5);
        }
        
        .halo-progress {
            stroke-dasharray: 100;
            stroke-dashoffset: 25; /* 75% complete */
            stroke-linecap: round;
        }

        /* Scrim Gradient for Depth */
        .bg-scrim {
            background: radial-gradient(circle at 50% 0%, rgba(54, 76, 60, 0.15) 0%, rgba(19, 19, 19, 1) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md min-h-screen flex flex-col items-center bg-scrim">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-container-padding-mobile h-16 bg-background/80 backdrop-blur-xl bg-transparent flat no shadows">
<button aria-label="Menu" class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Khalawat</h1>
<button aria-label="Settings" class="text-on-surface-variant hover:text-primary-fixed-dim transition-colors">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
</header>
<!-- Main Canvas -->
<main class="flex-grow w-full max-w-[680px] px-container-padding-mobile pt-24 pb-32 flex flex-col items-center justify-center space-y-section-gap">
<!-- Large Circular Status Indicator -->
<div class="relative flex items-center justify-center w-[180px] h-[180px] mt-8">
<!-- Progress Halo (Decorative) -->
<svg class="absolute inset-0 w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle class="text-surface-container-highest" cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-width="1"></circle>
<circle class="text-secondary halo-progress" cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-width="1.5"></circle>
</svg>
<!-- Core Status (Protected State) -->
<div class="flex flex-col items-center justify-center glass-panel rounded-full w-[150px] h-[150px] gold-glow relative z-10">
<span class="material-symbols-outlined text-secondary text-5xl mb-2" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-label-md text-label-md text-secondary">Protected</span>
</div>
<!-- Ambient Glow Behind Shield -->
<div class="absolute inset-0 bg-secondary/10 rounded-full blur-2xl -z-10"></div>
</div>
<!-- Spiritual Reminder / Context -->
<div class="w-full text-center px-gutter py-base">
<p class="font-headline-sm text-headline-sm text-on-surface-variant italic">
                "Patience is a pillar of faith."
            </p>
</div>
<!-- Stats Bento Grid -->
<div class="w-full grid grid-cols-2 gap-4">
<!-- Interventions Card -->
<div class="glass-panel rounded-xl p-6 flex flex-col justify-between h-[120px] gold-glow relative overflow-hidden group">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-background to-primary/30"></div>
<div class="flex justify-between items-start">
<span class="font-label-md text-label-md text-on-surface-variant">Interventions</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm" style="font-variation-settings: 'FILL' 0;">front_hand</span>
</div>
<div class="font-display-lg text-display-lg text-primary">
                    3
                </div>
</div>
<!-- Current Level Card -->
<div class="glass-panel rounded-xl p-6 flex flex-col justify-between h-[120px] relative overflow-hidden">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-background to-secondary/30"></div>
<div class="flex justify-between items-start">
<span class="font-label-md text-label-md text-on-surface-variant">Current Level</span>
<span class="material-symbols-outlined text-on-surface-variant text-sm" style="font-variation-settings: 'FILL' 0;">psychology</span>
</div>
<div class="font-headline-md text-headline-md text-secondary mt-1">
                    Cooling
                </div>
</div>
</div>
<!-- Spacer to push button down if needed, but flex-col handles it nicely with gap -->
<div class="flex-grow"></div>
<!-- Toggle Button Action -->
<div class="w-full pt-8 pb-4">
<button class="w-full py-4 rounded-lg bg-surface-container-high border border-error/30 text-error font-label-md text-label-md flex items-center justify-center space-x-2 hover:bg-error/10 transition-colors">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">gpp_bad</span>
<span>Disable Khalawat</span>
</button>
<p class="text-center font-body-md text-body-md text-on-surface-variant/50 mt-4 text-xs">
                Requires reflection to disable.
            </p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-surface-container-lowest/90 backdrop-blur-2xl border-t border-outline-variant/30 shadow-lg docked full-width bottom-0 rounded-t-xl md:hidden">
<button class="flex flex-col items-center justify-center text-on-secondary-fixed-variant opacity-60 hover:bg-surface-variant/50 w-16 rounded-xl py-1 transition-colors group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform mb-1" style="font-variation-settings: 'FILL' 0;">self_improvement</span>
<span class="font-label-md text-[10px] leading-tight">Reflect</span>
</button>
<button class="flex flex-col items-center justify-center text-primary bg-secondary-container/20 rounded-full px-4 py-1 hover:bg-surface-variant/50 transition-colors group scale-110 duration-300 ease-out">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span class="font-label-md text-[10px] leading-tight">Shield</span>
</button>
<button class="flex flex-col items-center justify-center text-on-secondary-fixed-variant opacity-60 hover:bg-surface-variant/50 w-16 rounded-xl py-1 transition-colors group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform mb-1" style="font-variation-settings: 'FILL' 0;">brightness_5</span>
<span class="font-label-md text-[10px] leading-tight">Nuur</span>
</button>
<button class="flex flex-col items-center justify-center text-on-secondary-fixed-variant opacity-60 hover:bg-surface-variant/50 w-16 rounded-xl py-1 transition-colors group">
<span class="material-symbols-outlined group-hover:scale-110 transition-transform mb-1" style="font-variation-settings: 'FILL' 0;">auto_graph</span>
<span class="font-label-md text-[10px] leading-tight">Growth</span>
</button>
</nav>
<!-- Web Desktop Navigation Cluster (Hidden on Mobile) -->
<nav class="hidden md:flex fixed top-0 right-16 h-16 items-center space-x-8 z-50">
<button class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md flex items-center space-x-2">
<span class="material-symbols-outlined text-sm">self_improvement</span>
<span>Reflect</span>
</button>
<button class="text-primary hover:text-primary transition-colors font-label-md text-label-md flex items-center space-x-2 border-b-2 border-primary pb-1 mt-1">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">shield_lock</span>
<span>Shield</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md flex items-center space-x-2">
<span class="material-symbols-outlined text-sm">brightness_5</span>
<span>Nuur</span>
</button>
<button class="text-on-surface-variant hover:text-primary transition-colors font-label-md text-label-md flex items-center space-x-2">
<span class="material-symbols-outlined text-sm">auto_graph</span>
<span>Growth</span>
</button>
</nav>
</body></html>
