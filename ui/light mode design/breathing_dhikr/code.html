<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

                        "outline": "#99907c",

                    "fontFamily": {
                        "display-lg": ["Newsreader", "serif"],

<style type="text/tailwindcss">
        @layer utilities {
            .glass-panel {
                @apply bg-surface/80 backdrop-blur-xl border border-outline-variant/30 shadow-lg;
            }
            .glow-effect {
                @apply relative;
            }
            .glow-effect::before {
                content: '';
                @apply absolute inset-0 rounded-full blur-2xl opacity-50 transition-opacity duration-1000 bg-primary-container/20;
                z-index: -1;
            }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Ambient Background Scrim -->
<div class="absolute inset-0 z-0 bg-[radial-gradient(circle_at_center,var(--tw-colors-secondary-container)_0%,var(--tw-colors-background)_80%)] opacity-80 mix-blend-multiply pointer-events-none"></div>
<!-- Main Intervention Container -->
<main class="relative z-10 w-full max-w-[680px] min-h-screen flex flex-col items-center justify-center px-container-mobile py-section-gap gap-12">
<!-- Header Text -->
<div class="text-center space-y-4 opacity-90 transition-opacity duration-1000">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">Breathe.</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">This feeling is temporary. Allow it to pass like a cloud in the sky.</p>
</div>
<!-- Breathing Guide Container -->
<div class="relative w-64 h-64 flex items-center justify-center mt-8 mb-12">
<!-- Breathing Circle (Static representation of expand/contract) -->
<div class="absolute inset-0 rounded-full border-2 border-primary/20 scale-75 opacity-50 transition-transform duration-[4000ms] ease-in-out glow-effect flex items-center justify-center">
<!-- Inner Solid Circle -->
<div class="w-3/4 h-3/4 rounded-full bg-gradient-to-tr from-surface-container-high to-surface-container border border-outline-variant/50 shadow-[inset_0_2px_10px_rgba(0,0,0,0.5)] flex flex-col items-center justify-center p-6 text-center">
<!-- Dhikr Text Overlay (Static representation of cycle) -->
<span class="font-quote-arabic text-quote-arabic text-primary mb-2">سبحان الله</span>
<span class="font-headline-sm text-headline-sm text-on-surface">SubhanAllah</span>
</div>
</div>
<!-- Expanding Ripple (Static) -->
<div class="absolute inset-0 rounded-full border border-primary/10 scale-100 opacity-20"></div>
<div class="absolute inset-[-20%] rounded-full border border-primary/5 scale-110 opacity-10"></div>
</div>
<!-- Instruction Text -->
<div class="text-center mt-8 space-y-2 opacity-80">
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Inhale Peace</p>
<p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest opacity-50">Exhale Tension</p>
</div>
<!-- Exit Button (Appears later in flow, static representation here) -->
<div class="mt-16 w-full flex justify-center opacity-30 pointer-events-none hover:opacity-100 transition-opacity duration-500">
<button class="glass-panel px-8 py-4 rounded-full flex items-center gap-3 text-on-surface-variant hover:text-primary transition-colors border-transparent hover:border-primary/50 group">
<span class="material-symbols-outlined text-xl group-hover:transform group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label-md text-label-md uppercase tracking-wider">Return to Peace</span>
</button>
</div>
</main>
<!-- Bottom Nav Bar (Suppressed as this is a focused, transactional flow) -->
<!-- Top Nav Bar (Suppressed as this is a full-screen intervention) -->
</body></html>
