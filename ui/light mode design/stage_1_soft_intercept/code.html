<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md">
<!-- Background Gradient (Deep Amber / Green hint) -->
<div class="absolute inset-0 bg-gradient-to-b from-[#0a1f0d] to-background opacity-80 z-0"></div>
<div class="absolute inset-0 scrim-gradient z-0 pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-[680px] px-container-padding-mobile md:px-container-padding-desktop flex flex-col items-center text-center">
<!-- Status Indicator -->
<div class="mb-section-gap">
<span class="font-label-md text-label-md text-primary/80 tracking-[0.1em] uppercase">Take a moment to reflect...</span>
</div>
<!-- Spiritual Reminder Container -->
<div class="w-full flex flex-col items-center space-y-8 mb-section-gap relative">
<!-- Decorative line -->
<div class="w-12 h-px bg-primary/30"></div>
<!-- Arabic Ayah -->
<div class="font-quote-arabic text-quote-arabic text-primary leading-loose text-center w-full max-w-lg" dir="rtl">
                وَمَا الْحَيَاةُ الدُّنْيَا إِلَّا مَتَاعُ الْغُرُورِ
            </div>
<!-- English Translation -->
<div class="font-headline-md text-headline-md text-on-surface-variant max-w-md mx-auto">
                "And what is the worldly life except the enjoyment of delusion."
            </div>
<!-- Source Citation -->
<div class="font-label-md text-label-md text-outline">
                Surah Al Imran [3:185]
            </div>
<!-- Decorative line -->
<div class="w-12 h-px bg-primary/30"></div>
</div>
<!-- Countdown Timer & Actions -->
<div class="flex flex-col items-center space-y-8 mt-8">
<!-- Circular Timer -->
<div class="relative w-24 h-24 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<!-- Background Ring -->
<circle class="text-surface-variant" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-width="2"></circle>
<!-- Progress Ring -->
<circle class="text-primary" cx="50" cy="50" fill="none" r="45" stroke="currentColor" stroke-dasharray="283" stroke-dashoffset="141.5" stroke-width="2"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center flex-col">
<span class="font-headline-sm text-headline-sm text-primary">15</span>
<span class="font-label-md text-[10px] text-outline">SEC</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col space-y-4 max-w-xs mx-auto">
<!-- Primary Action (Go Back) - styled as the Nuur button but disabled state for this intercept -->
<button class="w-full py-4 px-6 rounded-full bg-surface-variant text-on-surface-variant font-label-md text-label-md border border-outline-variant/30 opacity-50 cursor-not-allowed transition-all flex items-center justify-center space-x-2">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
<span>Go Back to Peace</span>
</button>
<!-- Secondary Action (Proceed) -->
<button class="w-full py-3 px-6 rounded-full bg-transparent text-outline font-label-md text-label-md opacity-40 cursor-not-allowed hover:text-on-surface transition-colors">
                    I still want to proceed
                </button>
</div>
</div>
