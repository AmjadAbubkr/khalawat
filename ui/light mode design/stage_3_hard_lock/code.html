<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Intervention Lock</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600&amp;family=Newsreader:wght@500;600&amp;family=Noto+Serif&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#735c00",
                        "primary": "#f2ca50",
                        "on-surface": "#e5e2e1",
                        "background": "#131313",
                        "on-surface-variant": "#d0c5af",
                        "surface-variant": "#353534",
                        "error": "#ffb4ab",
                        "on-secondary-fixed": "#0b2013",
                        "inverse-on-surface": "#313030",
                        "surface-container-low": "#1c1b1b",
                        "secondary": "#b4cdb8",
                        "on-error": "#690005",
                        "surface-container-highest": "#353534",
                        "outline": "#99907c",
                        "on-tertiary-fixed-variant": "#3f465c",
                        "on-primary": "#3c2f00",
                        "secondary-fixed": "#d0e9d4",
                        "surface-container-high": "#2a2a2a",
                        "primary-fixed": "#ffe088",
                        "on-primary-fixed-variant": "#574500",
                        "surface-container-lowest": "#0e0e0e",
                        "on-tertiary-container": "#3d455a",
                        "on-primary-fixed": "#241a00",
                        "tertiary-fixed-dim": "#bec6e0",
                        "primary-container": "#d4af37",
                        "surface": "#131313",
                        "error-container": "#93000a",
                        "primary-fixed-dim": "#e9c349",
                        "on-tertiary-fixed": "#131b2e",
                        "on-secondary-fixed-variant": "#364c3c",
                        "tertiary": "#c6cee8",
                        "tertiary-fixed": "#dae2fd",
                        "on-tertiary": "#283044",
                        "surface-bright": "#393939",
                        "secondary-container": "#364c3c",
                        "tertiary-container": "#abb2cc",
                        "surface-tint": "#e9c349",
                        "on-background": "#e5e2e1",
                        "surface-container": "#201f1f",
                        "inverse-surface": "#e5e2e1",
                        "on-secondary": "#203527",
                        "on-secondary-container": "#a3bba7",
                        "on-primary-container": "#554300",
                        "secondary-fixed-dim": "#b4cdb8",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131313",
                        "outline-variant": "#4d4635"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "32px",
                        "container-padding-mobile": "20px",
                        "container-padding-desktop": "40px",
                        "base": "8px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "label-md": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "quote-arabic": ["Noto Serif"],
                        "headline-sm": ["Newsreader"],
                        "headline-md": ["Newsreader"],
                        "display-lg": ["Newsreader"],
                        "body-md": ["Manrope"]
                    },
                    "fontSize": {
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "quote-arabic": ["24px", { "lineHeight": "40px", "fontWeight": "400" }],
                        "headline-sm": ["22px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-md": ["28px", { "lineHeight": "36px", "fontWeight": "500" }],
                        "display-lg": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body-md antialiased min-h-screen flex flex-col selection:bg-primary/30 selection:text-primary">
<!-- Intervention Shield Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding-mobile py-12 md:p-container-padding-desktop relative z-10 overflow-hidden">
<!-- Ambient Depth Scrim - Drawing eye to center -->
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-surface-container-high/40 to-background z-[-1] pointer-events-none"></div>
<div class="max-w-[680px] w-full flex flex-col items-center text-center gap-12 md:gap-16">
<!-- Lock Identity & Metaphor -->
<div class="flex flex-col items-center gap-6">
<!-- Elevated Lock Icon -->
<div class="w-24 h-24 rounded-full bg-surface-container-low flex items-center justify-center border border-outline-variant/20 shadow-[0_0_40px_rgba(242,202,80,0.05)] relative before:absolute before:inset-0 before:rounded-full before:border before:border-primary/10 before:scale-110">
<span class="material-symbols-outlined text-5xl text-primary opacity-90" data-icon="lock" data-weight="fill" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
<!-- Sacred Prompt -->
<div class="space-y-4 max-w-md mx-auto">
<h1 class="font-quote-arabic text-quote-arabic text-primary leading-relaxed" dir="rtl">
                        أَنْتَ وَضَعْتَ هَذَا الْقَفْلَ لِنَفْسِكَ
                    </h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">
                        You placed this lock on yourself
                    </p>
</div>
</div>
<!-- The Crucible (Timer) -->
<div class="flex flex-col items-center gap-6 w-full">
<!-- Scale transform used to emphasize the countdown within design system limits -->
<div class="font-display-lg text-display-lg text-on-surface tabular-nums tracking-widest scale-125 md:scale-150 transform origin-center drop-shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                    02:00
                </div>
<div class="bg-error-container/10 border border-error/20 px-6 py-3 rounded-full inline-flex items-center gap-3">
<span class="material-symbols-outlined text-error text-sm" data-icon="info">info</span>
<p class="font-label-md text-label-md text-error tracking-wide">
                        This lock cannot be bypassed. Use this time wisely.
                    </p>
</div>
</div>
<!-- Non-judgmental Guidance (Bento Suggestions) -->
<div class="w-full">
<div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
<!-- Guidance Card 1 -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 hover:border-primary/30 transition-colors duration-500 group relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<span class="material-symbols-outlined text-primary/70 text-3xl group-hover:text-primary transition-colors" data-icon="water_drop">water_drop</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Make wudu</h3>
</div>
<!-- Guidance Card 2 -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 hover:border-primary/30 transition-colors duration-500 group relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<span class="material-symbols-outlined text-primary/70 text-3xl group-hover:text-primary transition-colors" data-icon="door_open">door_open</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Leave the room</h3>
</div>
<!-- Guidance Card 3 -->
<div class="bg-surface-container-lowest border border-outline-variant/20 rounded-2xl p-6 flex flex-col items-center justify-center gap-4 hover:border-primary/30 transition-colors duration-500 group relative overflow-hidden">
<div class="absolute inset-0 bg-gradient-to-b from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<span class="material-symbols-outlined text-primary/70 text-3xl group-hover:text-primary transition-colors" data-icon="mosque">mosque</span>
<h3 class="font-headline-sm text-headline-sm text-on-surface">Pray 2 rak'ah</h3>
</div>
</div>
</div>
<!-- Locked Action -->
<div class="w-full max-w-[320px] pt-4">
<button class="w-full py-4 rounded-full bg-surface-variant border border-outline-variant/30 flex items-center justify-center gap-3 cursor-not-allowed opacity-50 relative overflow-hidden" disabled="">
<!-- Subtle progress indication strip behind text -->
<div class="absolute left-0 top-0 bottom-0 w-[5%] bg-on-surface-variant/10"></div>
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="hourglass_top">hourglass_top</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest relative z-10">Lock complete</span>
</button>
</div>
</div>
</main>
</body></html>
