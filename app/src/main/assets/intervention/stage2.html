<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalawat — Breathe</title>
<style>
/*--- Design System: Light = warm parchment / sage-gold ; Dark = charcoal / gold ---*/
:root{
  --bg:#fcf8f7;--on-bg:#1c1b1b;--primary:#5d5f5b;--primary-fixed:#e3e3de;
  --surface:#fcf8f7;--on-surface:#1c1b1b;--variant:#e5e2e1;--variant-text:#454843;
  --gold:#d4af37;--gold-dim:#e9c349;--error:#ba1a1a;--secondary:#4d644d;
  --deflection:#071a09;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#131313;--on-bg:#e5e2e1;--primary:#f2ca50;--primary-fixed:#ffe088;
    --surface:#131313;--on-surface:#e5e2e1;--variant:#353534;--variant-text:#d0c5af;
    --gold:#f2ca50;--gold-dim:#ffe088;--error:#ffb4ab;--secondary:#b4cdb8;
    --deflection:#131313;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);color:var(--on-bg);
  font-family:'Newsreader','Georgia',serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;padding:24px;text-align:center;
}
.container{max-width:420px;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:28px}
.section-title{font-size:0.8rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--gold);margin-bottom:4px;font-weight:600;font-family:'Manrope',sans-serif}
/* Breathing circle */
.breathing-container{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin:0 auto}
.breath-circle{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,color-mix(in srgb,var(--gold)20%,var(--bg)),color-mix(in srgb,var(--secondary)30%,var(--bg)));transition:all 4s ease-in-out;box-shadow:0 0 40px rgba(0,0,0,0.05);border:1px solid color-mix(in srgb,var(--gold)15%,transparent)}
.breath-circle.inhale{width:160px;height:160px;transition-duration:4s;transition-timing-function:ease-in}
.breath-circle.hold{width:160px;height:160px;transition-duration:0.1s;box-shadow:0 0 60px rgba(212,175,55,0.15)}
.breath-circle.exhale{width:80px;height:80px;transition-duration:8s;transition-timing-function:ease-out}
.breath-text{position:absolute;font-size:1.1rem;color:var(--primary);font-weight:600;font-family:'Manrope',sans-serif;pointer-events:none}
.breath-count{position:absolute;bottom:-28px;font-size:1.6rem;color:var(--gold);font-weight:700}
/* Dhikr */
.dhikr-section{width:100%}
.dhikr-grid{display:flex;flex-direction:column;gap:10px;width:100%}
.dhikr-item{display:flex;align-items:center;justify-content:space-between;background:var(--variant);border:1px solid color-mix(in srgb,var(--variant-text)10%,transparent);border-radius:12px;padding:14px 16px;cursor:pointer;transition:all 0.2s;user-select:none}
.dhikr-item:active{background:color-mix(in srgb,var(--gold)10%,var(--variant));transform:scale(0.98)}
.dhikr-arabic{font-size:1.3rem;font-family:'Scheherazade New','Traditional Arabic',serif;color:var(--on-surface)}
.dhikr-trans{font-size:0.75rem;color:var(--variant-text);font-family:'Manrope',sans-serif}
.dhikr-count{font-size:1.6rem;color:var(--gold);font-weight:700;min-width:40px;text-align:right}
/* Timer & buttons */
.stage-timer{font-size:0.85rem;color:var(--variant-text);margin-top:12px;font-family:'Manrope',sans-serif}
.btn-group{display:flex;flex-direction:column;gap:10px;align-items:center;width:100%}
.btn{padding:14px 32px;border-radius:9999px;font-size:0.95rem;cursor:pointer;border:none;font-weight:600;transition:all 0.3s;width:100%;max-width:280px;font-family:'Manrope',sans-serif}
.btn-primary{background:var(--gold);color:var(--bg)}
.btn-primary:hover{background:var(--gold-dim)}
.btn-primary:disabled{background:var(--variant);color:var(--variant-text);cursor:not-allowed;opacity:0.5}
.btn-override{background:transparent;color:var(--variant-text);font-size:0.8rem;cursor:pointer;border:none;text-decoration:underline;opacity:0.35;padding:8px}
.btn-override:disabled{opacity:0.1;cursor:not-allowed;text-decoration:none}
</style>
</head>
<body>
<div class="container">
  <div>
    <div class="section-title">Breathe with intention</div>
    <div class="breathing-container">
      <div class="breath-circle" id="breathCircle"></div>
      <div class="breath-text" id="breathText">Inhale</div>
      <div class="breath-count" id="breathCount">4</div>
    </div>
  </div>
  <div class="dhikr-section">
    <div class="section-title">Dhikr — tap to count</div>
    <div class="dhikr-grid">
      <div class="dhikr-item" onclick="incrementDhikr(0)">
        <div><div class="dhikr-arabic">{{DHIKR_1_ARABIC}}</div><div class="dhikr-trans">{{DHIKR_1_TRANS}}</div></div>
        <div class="dhikr-count" id="dhikr0">0</div>
      </div>
      <div class="dhikr-item" onclick="incrementDhikr(1)">
        <div><div class="dhikr-arabic">{{DHIKR_2_ARABIC}}</div><div class="dhikr-trans">{{DHIKR_2_TRANS}}</div></div>
        <div class="dhikr-count" id="dhikr1">0</div>
      </div>
      <div class="dhikr-item" onclick="incrementDhikr(2)">
        <div><div class="dhikr-arabic">{{DHIKR_3_ARABIC}}</div><div class="dhikr-trans">{{DHIKR_3_TRANS}}</div></div>
        <div class="dhikr-count" id="dhikr2">0</div>
      </div>
    </div>
  </div>
  <div class="stage-timer" id="stageTimer">Wait 30 seconds...</div>
  <div class="btn-group">
    <button class="btn btn-primary" id="calmBtn" disabled>I've calmed down — go back</button>
    <button class="btn-override" id="overrideBtn" disabled>Override</button>
  </div>
</div>
<script>
const WAIT_SECONDS=30; const LANG="{{LANG}}"; let waitLeft=WAIT_SECONDS;
let dhikrCounts=[0,0,0];
const breathCircle=document.getElementById('breathCircle');
const breathText=document.getElementById('breathText');
const breathCount=document.getElementById('breathCount');
const calmBtn=document.getElementById('calmBtn');
const overrideBtn=document.getElementById('overrideBtn');
const stageTimer=document.getElementById('stageTimer');
// Breathing 4-7-8
const phases=[
  {name:'Inhale',duration:4,cls:'inhale'},
  {name:'Hold',duration:7,cls:'hold'},
  {name:'Exhale',duration:8,cls:'exhale'}
];
let phaseIdx=0; let phaseCount=0;
function runBreathPhase(){
  const phase=phases[phaseIdx];
  breathCircle.className='breath-circle '+phase.cls;
  breathText.textContent=phase.name;
  phaseCount=phase.duration;
  breathCount.textContent=phaseCount;
  const countInterval=setInterval(()=>{
    phaseCount--;
    breathCount.textContent=phaseCount>0?phaseCount:'';
    if(phaseCount<=0){
      clearInterval(countInterval);
      phaseIdx=(phaseIdx+1)%phases.length;
      runBreathPhase();
    }
  },1000);
}
runBreathPhase();
// Wait timer
const waitInterval=setInterval(()=>{
  waitLeft--;
  stageTimer.textContent=waitLeft>0?'Wait '+waitLeft+' seconds...':'';
  if(waitLeft<=0){
    clearInterval(waitInterval);
    calmBtn.disabled=false;
    overrideBtn.disabled=false;
    stageTimer.textContent='';
  }
},1000);
calmBtn.addEventListener('click',()=>{window.history.back()});
overrideBtn.addEventListener('click',()=>{window.location.href='/stage3?lang='+LANG;});
function incrementDhikr(idx){
  dhikrCounts[idx]++;
  document.getElementById('dhikr'+idx).textContent=dhikrCounts[idx];
}
</script>
</body>
</html>
