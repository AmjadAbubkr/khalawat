<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khalawat — Pause</title>
<style>
/*--- Design System: Light = warm parchment / sage-gold ; Dark = charcoal / gold ---*/
:root{
  --bg:#fcf8f7;--on-bg:#1c1b1b;--primary:#5d5f5b;--primary-fixed:#e3e3de;
  --surface:#fcf8f7;--on-surface:#1c1b1b;--variant:#e5e2e1;--variant-text:#454843;
  --gold:#d4af37;--gold-dim:#e9c349;--error:#ba1a1a;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#131313;--on-bg:#e5e2e1;--primary:#f2ca50;--primary-fixed:#ffe088;
    --surface:#131313;--on-surface:#e5e2e1;--variant:#353534;--variant-text:#d0c5af;
    --gold:#f2ca50;--gold-dim:#ffe088;--error:#ffb4ab;
  }
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);color:var(--on-bg);
  font-family:'Newsreader','Georgia',serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;text-align:center;
}
.container{max-width:420px;width:100%}
.status-label{
  font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--gold);margin-bottom:32px;font-weight:600;
}
.ayah-arabic{
  font-size:1.8rem;line-height:1.8;color:var(--primary);margin-bottom:16px;
  font-family:'Scheherazade New','Traditional Arabic',serif;direction:rtl;
  unicode-bidi:bidi-override;text-align:center;
}
.ayah-translation{
  font-size:1.05rem;line-height:1.6;color:var(--variant-text);margin-bottom:8px;
  opacity:0;transition:opacity 1s;font-family:'Manrope',sans-serif;
}
.ayah-translation.visible{opacity:1}
.ayah-source{font-size:0.8rem;color:var(--variant-text);margin-bottom:40px;font-style:italic;opacity:0.7}
.timer-circle{
  width:140px;height:140px;border-radius:50%;border:3px solid var(--variant);
  display:flex;align-items:center;justify-content:center;margin:0 auto 32px;position:relative;
}
.timer-circle svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg)}
.timer-circle circle{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;stroke-dasharray:408;transition:stroke-dashoffset 1s linear}
.timer-number{font-size:2.5rem;font-weight:700;color:var(--gold);font-family:'Newsreader',serif}
.timer-label{font-size:0.75rem;color:var(--variant-text);letter-spacing:0.05em;text-transform:uppercase}
.btn-group{display:flex;flex-direction:column;gap:12px;align-items:center}
.btn{padding:14px 32px;border-radius:9999px;font-size:0.95rem;cursor:pointer;border:none;font-weight:600;transition:all 0.3s;width:100%;max-width:280px;font-family:'Manrope',sans-serif}
.btn-primary{background:var(--gold);color:var(--bg)}
.btn-primary:hover{background:var(--gold-dim)}
.btn-primary:disabled{background:var(--variant);color:var(--variant-text);cursor:not-allowed;opacity:0.5}
.btn-override{background:transparent;color:var(--variant-text);font-size:0.8rem;cursor:pointer;border:none;text-decoration:underline;opacity:0.4;padding:8px}
.btn-override:disabled{opacity:0.15;cursor:not-allowed;text-decoration:none}
.message{margin-top:24px;font-size:0.85rem;color:var(--variant-text);opacity:0.7;font-family:'Manrope',sans-serif}
/* subtle top gold thread */
.gold-thread{position:absolute;top:0;left:50%;transform:translateX(-50%);width:60px;height:2px;background:linear-gradient(90deg,transparent 0%,var(--gold) 50%,transparent 100%);border-radius:2px}
</style>
</head>
<body>
<div class="gold-thread"></div>
<div class="container">
  <div class="status-label">Take a moment to reflect...</div>
  <div class="ayah-arabic" id="arabicText">{{ARABIC}}</div>
  <div class="ayah-translation" id="translationText">{{TRANSLATION}}</div>
  <div class="ayah-source">{{SOURCE}}</div>
  <div class="timer-circle">
    <svg viewBox="0 0 140 140"><circle cx="70" cy="70" r="65" id="progressRing"/></svg>
    <div class="timer-number" id="timerNum">15</div>
  </div>
  <div class="btn-group">
    <button class="btn btn-primary" id="goBackBtn" disabled>Go Back to Peace</button>
    <button class="btn-override" id="continueBtn" disabled>I still want to proceed</button>
  </div>
  <div class="message" id="statusMsg">Breathe and reflect...</div>
</div>
<script>
const TIMER_SECONDS=15; const LANG="{{LANG}}"; let secondsLeft=TIMER_SECONDS;
const timerEl=document.getElementById('timerNum');
const progressRing=document.getElementById('progressRing');
const goBackBtn=document.getElementById('goBackBtn');
const continueBtn=document.getElementById('continueBtn');
const statusMsg=document.getElementById('statusMsg');
const transEl=document.getElementById('translationText');
const circumference=2*Math.PI*65;
progressRing.style.strokeDasharray=circumference;
progressRing.style.strokeDashoffset=0;
if(LANG==='ar'){transEl.style.display='none'}
setTimeout(()=>{transEl.classList.add('visible')},2000);
const interval=setInterval(()=>{
  secondsLeft--;
  timerEl.textContent=secondsLeft;
  const offset=circumference*(1-secondsLeft/TIMER_SECONDS);
  progressRing.style.strokeDashoffset=offset;
  if(secondsLeft<=0){
    clearInterval(interval);
    goBackBtn.disabled=false;
    continueBtn.disabled=false;
    statusMsg.textContent='You may choose now.';
    statusMsg.style.opacity='1';
  }
},1000);
goBackBtn.addEventListener('click',()=>{window.history.back()});
continueBtn.addEventListener('click',()=>{
  fetch('/stage2?lang='+LANG,{method:'GET'}).then(()=>{window.location.href='/stage2?lang='+LANG}).catch(()=>{window.location.href='/stage2?lang='+LANG});
});
</script>
</body>
</html>
